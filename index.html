<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>akhilbee.dev</title>
  
  <link rel="stylesheet" href="https://home.akhilbee.dev/theme.css">

  <script src="https://home.akhilbee.dev/footer.js" defer></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color, #0f172a);
      color: var(--text-color, #f8fafc);
      font-family: system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
      
      /* Flexbox layout to ensure footer snaps to bottom */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .main-wrapper {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
      box-sizing: border-box;
      flex: 1; /* Pushes the footer down when content is short */
    }

    header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-text {
      text-align: left;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
      color: var(--heading-color, #f1f5f9);
    }

    p.subtitle {
      color: var(--subheading-color, #94a3b8);
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Circular Theme Toggle Button */
    .theme-toggle-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border-color, #334155);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease, background-color 0.3s ease, border-color 0.3s ease;
      padding: 0;
      color: var(--text-color, #f8fafc);
    }

    .theme-toggle-btn:hover {
      transform: scale(1.08);
    }

    .theme-svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* Responsive grid layout */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border-color, #334155);
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .project-card:hover {
      transform: translateY(-4px);
      border-color: var(--heading-color, #38bdf8);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
    }

    .project-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--heading-color, #f1f5f9);
      margin-bottom: 8px;
    }

    .project-desc {
      font-size: 0.95rem;
      color: var(--text-color, #94a3b8);
      opacity: 0.85;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-block;
      background: var(--heading-color, #0284c7);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 9999px;
      align-self: flex-start;
    }

    /* Footer element styling hook */
    akhilbee-footer {
      width: 100%;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <header>
      <div class="header-text">
        <h1>akhilbee.dev</h1>
        <p class="subtitle">The home of my projects</p>
      </div>

      <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="Toggle dark/light mode">
        <svg class="theme-svg" viewBox="0 0 24 24">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3z"/>
        </svg>
      </button>
    </header>

    <main class="project-grid">

      <a href="https://unwordle.akhilbee.dev/" target="_blank" class="project-card">
        <div>
          <div class="project-title">Unwordle Solver</div>
          <div class="project-desc">An iterative Python & Flask Wordle solver powered by Google Ngrams data.</div>
        </div>
        <span class="tag">Python</span>
      </a>

      <a href="https://calculustools.akhilbee.dev/" target="_blank" class="project-card">
        <div>
          <div class="project-title">Calculus Tools</div>
          <div class="project-desc">A suite for solving derivatives, integrals, implicit differentiation, and Taylor expansions with live LaTeX editing.</div>
        </div>
        <span class="tag">Python / LaTeX</span>
      </a>

    </main>
  </div>

  <akhilbee-footer></akhilbee-footer>

  <script>
    // --- Dark / Light Mode Switcher ---
    const themeToggleBtn = document.getElementById('theme-toggle');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }

    // Check saved local storage theme or system preference
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
      applyTheme('dark');
    } else {
      applyTheme('light');
    }

    // Toggle event listener
    themeToggleBtn?.addEventListener('click', () => {
      const isDarkMode = document.body.classList.contains('dark-mode');
      const newTheme = isDarkMode ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
