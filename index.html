<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>akhilbee.dev</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    /* Neal.fun style responsive grid */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .project-card:hover {
      transform: translateY(-4px);
      border-color: #38bdf8;
      box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.1);
    }

    .project-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .project-desc {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-block;
      background: #0284c7;
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 9999px;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <header>
    <h1>akhilbee.dev</h1>
    <p class="subtitle">The home of my projects</p>
  </header>

  <main class="project-grid">

    <a href="https://unwordle.akhilbee.dev/" target="_blank" class="project-card">
      <div>
        <div class="project-title">Unwordle Solver</div>
        <div class="project-desc">An iterative Python & Flask Wordle solver powered by Google Ngrams data.</div>
      </div>
      <span class="tag">Python</span>
    </a>

    <a href="https://calculustools.akhilbee.dev/" target="_blank" class="project-card">
      <div>
        <div class="project-title">Calculus Tools</div>
        <div class="project-desc">A suite for solving derivatives, integrals, implicit differentiation, and Taylor expansions with live LaTeX editing.</div>
      </div>
      <span class="tag">Python / LaTEX</span>
    </a>

  </main>

</body>
</html>
